<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 130" role="img" aria-label="SSMART Home Automation">
  <!-- S — white on dark -->
  <text x="8" y="88"
        font-family="'Arial Rounded MT Bold','Trebuchet MS',Arial,sans-serif"
        font-size="92" font-weight="900" letter-spacing="-2"
        fill="#ffffff">S</text>
  <!-- SMART — orange -->
  <text x="68" y="88"
        font-family="'Arial Rounded MT Bold','Trebuchet MS',Arial,sans-serif"
        font-size="92" font-weight="900" letter-spacing="-2"
        fill="#f5a014">SMART</text>
  <!-- HOME AUTOMATION bar -->
  <rect x="8" y="100" width="408" height="26" rx="13" fill="#ffffff" opacity="0.12"/>
  <text x="214" y="118"
        font-family="'Arial Rounded MT Bold','Trebuchet MS',Arial,sans-serif"
        font-size="16" font-weight="700" letter-spacing="3.5"
        fill="#f5a014" text-anchor="middle">HOME AUTOMATION</text>
</svg>
