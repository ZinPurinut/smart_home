[phases.setup]
nixPkgs = [
    "php82",
    "php82Extensions.curl",
    "php82Extensions.dom",
    "php82Extensions.mbstring",
    "php82Extensions.pdo",
    "php82Extensions.tokenizer",
    "php82Extensions.xml",
    "php82Extensions.zip",
    "php82Packages.composer",
    "nodejs_20"
]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci",
    "npm run build"
]

[start]
cmd = "bash start.sh"
